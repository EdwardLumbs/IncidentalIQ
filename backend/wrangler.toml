# Cloudflare Worker config for the Trip Ops Incidental Monitor backend.
# Everything here is free-tier. Deploy with `npm run deploy` (needs `wrangler login` once).

name = "tripops-monitor"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# ── D1 database binding ──────────────────────────────────────────────
# `database_id` is filled in AFTER you run:  wrangler d1 create tripops
# (locally, `wrangler dev` uses a fake on-disk copy and ignores the id).
[[d1_databases]]
binding = "DB"                 # code accesses it as env.DB
database_name = "tripops"
database_id = "fcbbbfd2-eee8-4238-8cb0-3790ecce33a9"

# ── Cron: run the classifier every 6 hours, offset +15 min ──
# Cloudflare crons are UTC-ONLY (no timezone field). PH is UTC+8, so to fire at PH wall-clock
# 00:15 / 06:15 / 12:15 / 18:15 we subtract 8h → UTC 16:15 / 22:15 / 04:15 / 10:15 (hours 4,10,16,22).
#   04:15 UTC = 12:15 PH | 10:15 UTC = 18:15 PH | 16:15 UTC = 00:15 PH | 22:15 UTC = 06:15 PH
# The +15 offset is a cushion: the phone uploads on its own ~30-min cycle, so firing at :15 gives the
# most recent upload time to land in D1 BEFORE the classifier reads (else it waits a full 6h).
[triggers]
crons = ["15 4,10,16,22 * * *"]

# ── Secrets (NEVER in this file) — set once each with `wrangler secret put`:
#      wrangler secret put GROQ_API_KEY     ← your Groq key
#      wrangler secret put API_TOKEN        ← shared secret the phone must send on every request
# Generate a strong API_TOKEN with e.g.:  openssl rand -hex 32
# For local `wrangler dev`, put both in .dev.vars instead (see .dev.vars.example).

# ── Observability: keep logs so past cron runs / requests are reviewable in the dashboard ──
# (Free-tier included, capped + short retention — never bills. Without this, logs are live-only.)
[observability]
enabled = true

# ── Plain (non-secret) config. ──
[vars]
GROQ_MODEL = "llama-3.3-70b-versatile"
BATCH_SIZE = "25"
MAX_MSGS_PER_RUN = "300"     # cap messages classified per cron run (keeps subrequests bounded)
